---
pipeline:
    name: nascent
    description: "prepare round spermatid nascent RNA-seq data for pipeline analysis"
    # version: v0.0.1
# suiteVersions:
#     suiteName: v0.0.0
actions: 
    _global:
        environment: protamine-nascent
        condaFamilies:
            - base
            - rtracklayer
    bin:
        order: 1
        optionFamilies:
            - nascent
            - composite
            - genome
            - bin
        resources:
            required:
                total-ram: 16G
            recommended: 
                n-cpu: 2
                ram-per-cpu: 8G
        job-manager:
            recommended:
                time-limit: 2:00:00
        description: "liftover nascent RNA-seq data and set binned transcription levels for the primary genome"
    tss:
        order: 2
        optionFamilies:
            - nascent
            - composite
            - genome
            - annotation
        resources:
            required:
                total-ram: 24G
            recommended: 
                n-cpu: 12
                ram-per-cpu: 2G
        job-manager:
            recommended:
                time-limit: 4:00:00
        description: "liftover nascent RNA-seq data and rank gene TSSs by transcription level for the primary genome"
