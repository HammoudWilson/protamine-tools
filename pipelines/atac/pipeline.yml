---
pipeline:
    name: atac
    description: "prepare protamine ATAC-seq data for analysis in the interactive app"
    # version: v0.0.1
# suiteVersions:
#     suiteName: v0.0.0
actions: 
    _global:   
        environment: protamine-tools
        condaFamilies:
            - base
            - protaminer
            - r-4.4
    align:
        order: 1
        optionFamilies:
            - samples
            - genome
            - alignment
            - quality
        resources:
            required:
                total-ram: 32G
            recommended: 
                n-cpu: 16
                ram-per-cpu: 2G
        job-manager:
            recommended:
                time-limit: 24:00:00
        description: "parse and align ATAC-seq reads to the composite genome using Bowtie2"
    collate:
        order: 2
        optionFamilies:
            - samples
            - composite
            - genome
            - quality
            - bin
            - stage
            - score
        resources:
            required:
                total-ram: 8G
            recommended: 
                n-cpu: 14
                ram-per-cpu: 2G
        job-manager:
            recommended:
                time-limit: 12:00:00
        description: "collate read data across all samples into high resolution bins with various scores"
    tss:
        order: 3
        optionFamilies:
            - samples
            - genome
            - annotation
            - insert
            - stage
            - tss
        resources:
            required:
                total-ram: 8G
            recommended: 
                n-cpu: 4
                ram-per-cpu: 2G
        job-manager:
            recommended:
                time-limit: 2:00:00
        description: "map ATAC fragments around (in)active TSSs at base-level resolution"
package:
    collate: # the pipeline action after which a data package should assembled
        uploadType: protaminer # a signal to the Stage 2 framework regarding the package contents
        files:
            # binCounts:
            #     type: rds
            #     file: $DATA_FILE_PREFIX.binCounts.rds
            collate:
                type: rds
                file: $DATA_FILE_PREFIX.collate.rds
            # scores:
            #     type: rds
            #     file: $DATA_FILE_PREFIX.scores.rds
    tss:
        uploadType: protamine-atac-tss # a signal to the Stage 2 framework regarding the package contents
        files:
            tssFrags:
                type: rds
                file: $DATA_FILE_PREFIX.tssFrags.rds
            # abInitio:
            #     type: rds
            #     file: $DATA_FILE_PREFIX.abInitio.rds
container:
    supported: false
    registry:  ghcr.io  # domain name of your OCI-compatible, oras-accessible, container registry [ghcr.io]
    owner:     xxxxxxxx # the name of the owner, e.g., user or organization, at 'registry'
    installer: apt-get  # the installer program used by the container OS, typically apt-get or yum [apt-get]
