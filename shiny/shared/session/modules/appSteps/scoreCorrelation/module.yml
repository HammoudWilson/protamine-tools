#----------------------------------------------------------------------
# ui
#----------------------------------------------------------------------
shortLabel:       "Score Correlation" # shown on dashboard menu 
shortDescription: "Plot correlations of genome-level bin scores." # shown on Overview page
longLabel:        "Plot genome-level score correlations" # shown at top of appStep page 

#----------------------------------------------------------------------
# server
#----------------------------------------------------------------------
types: # names of the type(s) of this module ...
    - scoreCorrelation
sourceTypes: upload # ... and of the module(s) on which it depends

#----------------------------------------------------------------------
# dependencies
#----------------------------------------------------------------------
packages: # required R packages
    R:  null
    Bioconductor: null

## optional data classes and UI modules this module will use
## e.g., might expect to find shared/optional/classes/<classType>/<className>/<className>_*.R
#classes:
#    classType:
#        - className            
#modules: null

#----------------------------------------------------------------------
# module-level settings
#----------------------------------------------------------------------
settings:
    Score_Correlation:
        N_Bins_Per_Point:
            type:   selectInput
            choices:
                - 1
                - 3
                - 10
                - 30
                - 100
            value: 1
        Set_Axis_Limits:
            type:   selectInput
            choices:
                - from_defaults
                - from_data_range
            value: from_data_range
        N_Plot_Points:
            type:   numericInput
            value:  5000
            min:    10000
            max:    200000
            step:   10000 
        Data_Range_Min_Quantile:
            type:   numericInput
            value: 0.01
