#----------------------------------------------------------------------
# ui
#----------------------------------------------------------------------
shortLabel:       "V Plots" # shown on dashboard menu 
shortDescription: "Construct sample-specific V plots for ATAC-seq TSS analysis." # shown on Overview page
longLabel:        "Construct sample-specific V plots" # shown at top of appStep page 

#----------------------------------------------------------------------
# server
#----------------------------------------------------------------------
types: # names of the type(s) of this module ...
    - protAtac_vPlots
sourceTypes: null # ... and of the module(s) on which it depends

#----------------------------------------------------------------------
# dependencies
#----------------------------------------------------------------------
packages: # required R packages
    R:  null
    Bioconductor: null

## optional data classes and UI modules this module will use
## e.g., might expect to find shared/optional/classes/<classType>/<className>/<className>_*.R
#classes:
#    classType:
#        - className            
#modules: null

#----------------------------------------------------------------------
# module-level settings
#----------------------------------------------------------------------
settings:
    V_Plot:
        Min_TSS_RPKM:
            type:   numericInput
            value:  1
            min:    0.5
            max:    100
            step:   0.5
        Min_Fold_Increase:
            type:   numericInput
            value:  10
            min:    10
            max:    100
            step:   5 
        BP_Per_Bin:
            type:   numericInput
            value:  5
            min:    1
            max:    25
            step:   1
        Max_Plotted_Inserts:
            type:   numericInput
            value:  1000000
            min:    1000000
            max:    100000000
            step:   1000000
        Max_X_Distance:
            type:   numericInput
            value:  600
            min:    300
            max:    1000
            step:   100
        Max_Y_Size:
            type:   numericInput
            value:  600
            min:    300
            max:    1000
            step:   100
