---
options:
    metadata-file: 
        order: 1
        short: M
        type: string
        required: true
        default: null
        description: "path to a metadata file with sample information"
    tss-bed:
        order: 2
        short: B
        type: character
        required: false
        default: NA # defaults in pipeline code to the output of the nascent/tss action
        description: "path to a BED file containing active TSSs, like that generated by nascent/tss"
    max-site-weight:
        order: 3
        short: W
        type: integer
        required: false
        default: 10 # this options controls the divide-by-small-number volatility of exp/obs site weights
        description: "maximum Tn5-preferenced adjusted weight per insert end when creating footprint"
