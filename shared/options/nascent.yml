---
options:
    bigwig-file-forward: 
        order: 1
        short: 1
        type: string
        required: true
        default: null
        description: "path to a bigwig file with forward strand nascent RNA-seq data"
    bigwig-file-reverse:  
        order: 2
        short: 2
        type: string
        required: true
        default: null
        description: "path to a bigwig file with reverse strand nascent RNA-seq data"
    liftOver-chain: 
        order: 3
        short: C
        type: string
        required: false
        default: NA
        description: "optional path to a chain file for liftover to --genome"
