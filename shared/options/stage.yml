---
options:
    histone-stage: 
        order: 1
        short: l
        type: character
        required: false
        default: early_RS
        description: "name of a single spermatid stage that best represents histone-bound chromatin"
    protamine-stage: 
        order: 2
        short: L
        type: character
        required: false
        default: int_ES
        description: "name of a single spermatid stage that best represents the protamine transition state"
    stage-types:
        order: 3
        short: x
        type: character
        required: false
        default: round:early_RS,int_RS,late_RS;elong:early_ES,int_ES # deliberately omit earliest_ES, late_ES, which has low signal, and mESC
        description: "assignment of spermatid stages into two stage types as stageType1:stage1[,stage2...];stageType2:stage3[,stage4...]"
