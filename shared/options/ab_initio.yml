---
options:
    ab-initio-stages: 
        order: 1
        short: A
        type: string
        required: false
        default: early_RS,int_RS,late_RS,earliest_ES,early_ES,int_ES
        description: "comma-separated list of stages to analyze for dinucleosome footprints"
    umap-n-neighbors: 
        order: 2
        short: null
        type: integer
        required: false
        default: 15
        description: "size of umap local neighborhood, same as uwot::umap n_neighbors"
    kmeans-k: 
        order: 3
        short: null
        type: integer
        required: false
        default: 25
        description: "number of clusters to find in dinucleosome overlap regions"
