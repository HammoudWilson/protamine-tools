---
# this job file executes pipeline actions required to prepare Pro-seq nascent transcription data
# update variables PROJECT_NAME, OUTPUT_DIR, RESOURCE_DIR as needed
pipeline: protamine-tools/nascent:latest
variables:
    TIMESTAMP:    102525
    VERSION:      v6
    PROJECT_NAME: atac_${TIMESTAMP}_${VERSION}
    OUTPUT_DIR:   ${PWD}
    RESOURCE_DIR: ${PWD}
shared:
    nascent:
        bigwig-file-forward: ${RESOURCE_DIR}/GSE228452_mm10_rs_proseq_n3spike_F.bw
        bigwig-file-reverse: ${RESOURCE_DIR}/GSE228452_mm10_rs_proseq_n3spike_R.bw
        liftOver-chain:      ${RESOURCE_DIR}/mm10ToMm39.over.chain
    output:
        output-dir: ${OUTPUT_DIR}
        data-name:  ${PROJECT_NAME}
bin:
tss:
execute:
    # dependent actions, run after genome/bin
    - bin
    - tss

# Pro-seq round spermatid data are from:
# https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE228452

# Read pairs were trimmed using cutadapt 1.14 to remove adapter sequences (-O 1 --match-read-wildcards -m 26)
# The paired end reads were then mapped to a combined genome index, including both the spike (dm6) and primary (mm10) genomes, using bowtie2. 
# Properly paired reads were retained. These read pairs were then separated based on the genome (i.e., spike-in vs primary) to which they mapped.
# Reads mapping to the reference genome were then sorted, via samtools 1.3.1 (-n), and subsequently converted to bedGraph format using a custom script (bowtie2stdBedGraph.pl) 
# that counts each read once at the exact 3’ end of the nascent RNA. Because R1 in PRO-seq reveals the position of the RNA 3’ end, 
# the “+” and “-“ strands were swapped to generate bedGraphs representing 3’ end positions at single nucleotide resolution.
# BedGraphs were normalized using the normalize_bedGraph custom script. For each library generated, we first divided the reads mapping to the spike genome (fly dm6) 
# by the primary genome (mm10). Next, we calculated the normalization factor by setting the lowest sample spike ratio to 1 and generated normalization 
# factors based on that for each sample. Because the Round Spermatid cells are haploid, we added a genome copy number correction and divided the spike factors by 2.
# Combined bedGraphs were generated by summing counts per nucleotide across replicates for each condition (bedgraphs2stdBedgraph). 
# These were converted to bigwigs using UCSC tools.
# Assembly: mm10
# Supplementary files format and content: merged bigwigs of 3 normalized replicates, representing 3' ends of RNA
# Library strategy: PRO-seq
